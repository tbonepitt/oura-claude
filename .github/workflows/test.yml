name: Tests (must pass before deploy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit tests (no API calls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install flask pytest
      - name: Run unit tests
        run: python -m pytest tests/test_calculations.py -v --tb=short

  live-regression:
    name: Live regression (real Oura API)
    runs-on: ubuntu-latest
    # Only run if the secret is available (skips on forks / PRs from forks)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install flask pytest
      - name: Run live regression tests against real Oura data
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: python -m pytest tests/test_live_regression.py -v --tb=short
